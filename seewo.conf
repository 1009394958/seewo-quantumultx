[rewrite_local]
# 方式一（推荐）：捕获登录响应，自动提取 token
^https:\/\/edu\.seewo\.com\/app\/api\/v1\/wx\/code\/login url script-response-body SeewoToken.js

# 方式二（备选）：从 Cookie 中提取 token（备用）
# ^https:\/\/edu\.seewo\.com\/(app\/api\/v1\/wx\/code\/login|api\/v2\/user\/info) url script-request-header SeewoToken.js

[task_local]
# 每天 9:00 自动执行签到
0 9 * * * SeewoDailySign.js, tag=希沃每日签到

[mitm]
hostname = edu.seewo.com, easinote.seewo.com
